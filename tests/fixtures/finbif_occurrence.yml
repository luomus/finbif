        include records with quality issues (normally exluded by default). Multiple
        values are seperated by '',''. When multiple values are given, this is an
        OR search.","schema":{"type":"string"}},{"name":"collectionId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of collections. Use Collections-API to resolve
        identifiers. Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search. API resource: /collections","schema":{"type":"string"}},{"name":"collectionIdExplicit","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of collections. Use Collections-API to resolve
        identifiers. Will not include child collections Multiple values are seperated
        by '',''. When multiple values are given, this is an OR search. API resource:
        /collections","schema":{"type":"string"}},{"name":"collectionIdNot","in":"query","required":false,"description":"Exclude
        certain collections. Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search. API resource: /collections","schema":{"type":"string"}},{"name":"collectionIdExplicitNot","in":"query","required":false,"description":"Exclude
        certain collection (only the specified collection, not child collections)
        Multiple values are seperated by '',''. When multiple values are given, this
        is an OR search. API resource: /collections","schema":{"type":"string"}},{"name":"includeSubCollections","in":"query","required":false,"description":"Defines
        if collectionId filter should include sub collections of the given collection
        ids. By default sub collections are included.","schema":{"type":"boolean"}},{"name":"sourceId","in":"query","required":false,"description":"Filter
        using identifiers of data sources (information systems). Use InformationSystem-API
        to resolve identifiers. Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search. API resource: /sources","schema":{"type":"string"}},{"name":"recordBasis","in":"query","required":false,"description":"Filter
        using record basis. This can be used for example to get only preserved specimens.
        Multiple values are seperated by '',''. When multiple values are given, this
        is an OR search.","schema":{"type":"string","enum":["PRESERVED_SPECIMEN","LIVING_SPECIMEN","FOSSIL_SPECIMEN","SUBFOSSIL_SPECIMEN","SUBFOSSIL_AMBER_INCLUSION_SPECIMEN","MICROBIAL_SPECIMEN","HUMAN_OBSERVATION_UNSPECIFIED","HUMAN_OBSERVATION_SEEN","HUMAN_OBSERVATION_HEARD","HUMAN_OBSERVATION_PHOTO","HUMAN_OBSERVATION_INDIRECT","HUMAN_OBSERVATION_HANDLED","HUMAN_OBSERVATION_VIDEO","HUMAN_OBSERVATION_RECORDED_AUDIO","MACHINE_OBSERVATION_UNSPECIFIED","MACHINE_OBSERVATION_PHOTO","MACHINE_OBSERVATION_VIDEO","MACHINE_OBSERVATION_AUDIO","MACHINE_OBSERVATION_GEOLOGGER","MACHINE_OBSERVATION_SATELLITE_TRANSMITTER","LITERATURE","MATERIAL_SAMPLE","MATERIAL_SAMPLE_AIR","MATERIAL_SAMPLE_SOIL","MATERIAL_SAMPLE_WATER"]}},{"name":"superRecordBasis","in":"query","required":false,"description":"Filter
        using super record basis. (Note: Even though the enumeration lists all record
        basis values, only few of those are super record basis: PRESERVED_SPECIMEN,
        HUMAN_OBSERVATION_UNSPECIFIED, ..; use aggregate by superRecordBasis to find
        used values. Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search.","schema":{"type":"string","enum":["PRESERVED_SPECIMEN","LIVING_SPECIMEN","FOSSIL_SPECIMEN","SUBFOSSIL_SPECIMEN","SUBFOSSIL_AMBER_INCLUSION_SPECIMEN","MICROBIAL_SPECIMEN","HUMAN_OBSERVATION_UNSPECIFIED","HUMAN_OBSERVATION_SEEN","HUMAN_OBSERVATION_HEARD","HUMAN_OBSERVATION_PHOTO","HUMAN_OBSERVATION_INDIRECT","HUMAN_OBSERVATION_HANDLED","HUMAN_OBSERVATION_VIDEO","HUMAN_OBSERVATION_RECORDED_AUDIO","MACHINE_OBSERVATION_UNSPECIFIED","MACHINE_OBSERVATION_PHOTO","MACHINE_OBSERVATION_VIDEO","MACHINE_OBSERVATION_AUDIO","MACHINE_OBSERVATION_GEOLOGGER","MACHINE_OBSERVATION_SATELLITE_TRANSMITTER","LITERATURE","MATERIAL_SAMPLE","MATERIAL_SAMPLE_AIR","MATERIAL_SAMPLE_SOIL","MATERIAL_SAMPLE_WATER"]}},{"name":"lifeStage","in":"query","required":false,"description":"Filter
        using life stage of an unit. Multiple values are seperated by '',''. When
        multiple values are given, this is an OR search.","schema":{"type":"string","enum":["ADULT","JUVENILE","IMMATURE","EGG","TADPOLE","PUPA","NYMPH","SUBIMAGO","LARVA","SNAG","EMBRYO","SUBADULT","MATURE","STERILE","FERTILE","SPROUT","DEAD_SPROUT","BUD","FLOWER","WITHERED_FLOWER","SEED","RIPENING_FRUIT","RIPE_FRUIT","SUBTERRANEAN","GALL","MARKS","TRIUNGULIN"]}},{"name":"sex","in":"query","required":false,"description":"Filter
