        so on; for example -7/0 is a range between 7 days ago and today. Multiple
        values are seperated by '',''. When multiple values are given, this is an
        OR search.","schema":{"type":"string"}},{"name":"timeAccuracy","in":"query","required":false,"description":"Filter
        using event date accuracy range in days. Will include entries where time span
        in days is less or equal to the given value.","schema":{"type":"integer"}},{"name":"yearMonth","in":"query","required":false,"description":"Filter
        using event date. Value can be a year (2000), year range (2000/2001), year-month
        (2000-06) or a year-month range (2000-06/2000-08). (Note: this filter is mostly
        aimed to be used in /statistics queries because ''time'' filter is not available
        for /statistics queries.) Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search.","schema":{"type":"string"}},{"name":"dayOfYear","in":"query","required":false,"description":"Filter
        using day of year. For example \"100/160\" gives all records during spring
        and \"330/30\" during mid winter. If begin is ommited will use day 1 and if
        end is ommited will use day 366. Multiple ranges can be given by providing
        the parameter more times. Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search.","schema":{"type":"string"}},{"name":"season","in":"query","required":false,"description":"Filter
        using season. For example \"501/630\" gives all records for May and July and
        \"1220/0220\" between 20.12. - 20.2. If begin is ommited will use 1.1. and
        if end is ommited will use 31.12. Multiple ranges can be given by providing
        the parameter more times. Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search.","schema":{"type":"string"}},{"name":"keyword","in":"query","required":false,"description":"Filter
        using keywords that have been tagged to entries. There are many types of keywods
