        using reliability of the occurrence Multiple values are seperated by '',''.
        When multiple values are given, this is an OR search.","schema":{"type":"string","enum":["RELIABLE","UNDEFINED","UNRELIABLE"]}},{"name":"effectiveTag","in":"query","required":false,"description":"Filter
        using effective tags of the record Multiple values are seperated by '',''.
        When multiple values are given, this is an OR search.","schema":{"type":"string","enum":["ADMIN_MARKED_SPAM","ADMIN_MARKED_COARSE","ADMIN_MARKED_NON_WILD","EXPERT_TAG_VERIFIED","EXPERT_TAG_UNCERTAIN","EXPERT_TAG_ERRONEOUS","COMMUNITY_TAG_VERIFIED","AUTO_VALIDATIONS_PASS","CHECKED_CANNOT_VERIFY","CHANGED_OWNER_MANUAL","CHANGED_DW_AUTO","CHECK","CHECK_COORDINATES","CHECK_DATETIME","CHECK_LOCATION","CHECK_OBSERVER","CHECK_TAXON","CHECK_DUPLICATE","CHECK_WILDNESS","CHECK_NEEDS_INFO","CHECK_SPAM","CHECK_BREEDING_INDEX","AUTO_DISTRIBUTION_CHECK","AUTO_PERIOD_CHECK","FORMADMIN_CENSUS_COUNT_ERROR","FORMADMIN_CENSUS_INNER_COUNT_ERROR","FORMADMIN_CENSUS_OTHER_ERROR","FORMADMIN_VERIFIED","FORMADMIN_UNCERTAIN","INVASIVE_FULL","INVASIVE_PARTIAL","INVASIVE_NO_EFFECT","INVASIVE_NOT_FOUND"]}},{"name":"unidentified","in":"query","required":false,"description":"Show
        only records that need an identification (or do not need an identification)","schema":{"type":"boolean"}},{"name":"needsCheck","in":"query","required":false,"description":"Show
        only records that are marked to need checking by experts (or do not need checking)","schema":{"type":"boolean"}},{"name":"completeListTaxonId","in":"query","required":false,"description":"Show
