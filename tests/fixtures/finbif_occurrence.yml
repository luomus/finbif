        i atlasrutan är möjlig. Besökt platsen endast en gång eller observerat fågeln
        endast en gång trots flera besök till platsen"}},{"id":"MY.atlasCodeEnum3","value":{"en":"3
        Possible breeding; Observed a pair in one day in the breeding season in a
        possible nesting habitat, and breeding of the species in the atlas square
        is possible","sv":"3 Möjlig häckning; Observerat ett par en gång vid häckningstiden
        i en för arten lämplig häckningsbiotop, och artens häckning i atlasrutan är
        möjlig","fi":"3 Mahdollinen pesintä: havaittu pari kerran pesimäaikaan sopivassa
        pesimäympäristössä, ja lajin pesintä ruudussa on mahdollista"}},{"id":"MY.atlasCodeEnum4","value":{"fi":"4
        Todennäköinen pesintä: havaittu laulava, soidinmenoja esittävä tai muuten
        samalla paikalla (eli pysyvällä reviirillä) pesimäaikaan oleskeleva koiras
        eri päivinä","en":"4 Probable breeding; Observed a singing, displaying, or
        otherwise persistently staying male in the same place (i.e. on a permanent
        territory) on at least two days in the same breeding season","sv":"4 Möjlig
        häckning; Observerat sjungande eller spelande hane eller hane som annars vistas
