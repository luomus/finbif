        eggshells, dead brood or remains of chicks, “dandruff” from feather sheaths
        etc., indicating that breeding occurred in the same year"}},{"id":"MY.atlasCodeEnum72","value":{"fi":"72
        Varma pesintä: havaittu linnun menevän pesään tai lähtevän pesästä tavalla,
        joka selvästi viittaa pesimiseen (ei kuitenkaan ole nähty munia, tai nähty
        tai kuultu poikasia; esim. koloihin tai korkealle pesivät lajit).","sv":"72
        Säker häckning: observerat att fågeln besöker boet eller lämnar boet på ett
        sätt som tydligt indikerar häckning (har ändå inte sett ägg eller ungar; t.ex.
        arter som häckar i bohål eller högt uppe)","en":"72 Confirmed breeding; Observed
        a bird entering or leaving a nest in a way that clearly indicates breeding
        (although eggs or chicks have not been seen or chicks not heard, e.g. high
        nests or nest holes)"}},{"id":"MY.atlasCodeEnum73","value":{"fi":"73 Varma
        pesintä: havaittu juuri lentokykyiset poikaset tai untuvikot, jotka voidaan
        katsoa syntyneiksi ruudun alueella.","en":"73 Confirmed breeding; Observed
        recently fledged young (nidicolous species) or downy young (nidifugous species)
        that can be considered born within the atlas square","sv":"73 Säker häckning:
        observerat ungar som nyligen blivit flygga eller dunungar som kan anses vara
        födda inom ifrågavarande atlasruta"}},{"id":"MY.atlasCodeEnum74","value":{"en":"74
        Confirmed breeding; Observed an adult carrying or transporting food for young
        or a faecal sac, and the nest can be considered situating within the atlas
        square","fi":"74 Varma pesintä: havaittu emo kantamassa tai kuljettamassa
