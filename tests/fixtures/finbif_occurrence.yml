        only those annotations that have been made before or on the same date/timestamp.
        Format is yyyy-MM-dd or UNIX EPOCH timestamp in seconds.","schema":{"type":"string","format":"yyyy-MM-dd"}},{"name":"qualityIssues","in":"query","required":false,"description":"Possible
