        only units where unit has 3d models or doesn''t have 3d-models.","schema":{"type":"boolean"}},{"name":"hasMedia","in":"query","required":false,"description":"Filter
        only records where parent document, gathering or unit has media or none have
        media.","schema":{"type":"boolean"}},{"name":"teamMember","in":"query","required":false,"description":"Filter
        based on verbatim observer names. Search is case insensitive and wildcard
