        identifiers. Returns occurrences of taxa that belong to the specified taxon
        set. Multiple values are seperated by '',''. When multiple values are given,
        this is an OR search. API resource: /metadata/ranges/MX.taxonSetEnum","schema":{"type":"string"}},{"name":"taxonCensus","in":"query","required":false,"description":"Show
        only records where observations are completely recorded for this higher taxon.
        For example include only records where all birds or mammals were documented,
        if they were seens -> something that is not documented was not seen. Use taxon
        IDs. Multiple values are seperated by '',''. When multiple values are given,
        this is an OR search. API resource: /taxa","schema":{"type":"string"}},{"name":"hasSample","in":"query","required":false,"description":"Include
        only those units that have samples or those that do not have samples.","schema":{"type":"boolean"}},{"name":"unitFact","in":"query","required":false,"description":"Format
        is \"factName=value;otherFact=value\". If value is not given (for example
        just \"factName\"), this filter matches all records that have the given fact.
        If value is a numeric range (for example \"factName=-5.0/-1.5\"), this filter
        matches all values where the value is between the range (inclusive). When
