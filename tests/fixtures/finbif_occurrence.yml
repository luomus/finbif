        is an OR search. API resource: /taxa","schema":{"type":"string"}},{"name":"target","in":"query","required":false,"description":"Same
        as taxonId, but system resolves identifier of the taxon based on the given
        target name. If no such match can be resolved (name does not exist in taxonomy),
        will filter based on the given verbatim target name (case insensitive). Multiple
        values are seperated by '',''. When multiple values are given, this is an
        OR search.","schema":{"type":"string"}},{"name":"useIdentificationAnnotations","in":"query","required":false,"description":"By
        default, all taxon linking related filters use taxon linking that may have
        been altered because of quality control identification annotations. If you
        want to use original user identifications, set this to false.","schema":{"type":"boolean","default":true}},{"name":"includeSubTaxa","in":"query","required":false,"description":"By
        default, all taxon linking related filters return all entries that belong
        to the filtered taxa. To return only exact matches (no subtaxa), set this
        to false.","schema":{"type":"boolean","default":true}},{"name":"includeNonValidTaxa","in":"query","required":false,"description":"Set
        to false if you want to include only those entries where reported target name
        can be linked with a taxon of the reference taxonomy. By default includes
        all entries.","schema":{"type":"boolean","default":true}},{"name":"onlyNonValidTaxa","in":"query","required":false,"description":"Set
        to true if you want to include only those entries where reported target name
        can not be linked with a taxon of the reference taxonomy. By default includes
        all entries.","schema":{"type":"boolean"}},{"name":"informalTaxonGroupId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of an informal taxon group. Use InformalTaxonGroups-API
        to find identifiers. Will return entries that have been linked with taxa that
        belong to one of the given groups. Multiple values are seperated by '',''.
        When multiple values are given, this is an OR search. API resource: /informal-taxon-groups","schema":{"type":"string"}},{"name":"informalTaxonGroupIdNot","in":"query","required":false,"description":"Exclude
        based on URI or Qname identifier of an informal taxon group. Use InformalTaxonGroups-API
        to find identifiers. Will exclude entries that have been linked with taxa
        that belong to any of the given groups. Multiple values are seperated by '',''.
        When multiple values are given, this is an OR search. API resource: /informal-taxon-groups","schema":{"type":"string"}},{"name":"informalTaxonGroupIdIncludingReported","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of an informal taxon group. Use InformalTaxonGroups-API
        to find identifiers. Will return entries that have been linked with taxa that
        belong to one of the given groups OR reported to belong to one of the given
        groups. Multiple values are seperated by '',''. When multiple values are given,
        this is an OR search. API resource: /informal-taxon-groups","schema":{"type":"string"}},{"name":"administrativeStatusId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of an administrative status. Use Metadata-API
        to find identifiers. Will return entries of taxa that are marked with the
        admin status. Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search. API resource: /metadata/ranges/MX.adminStatusEnum","schema":{"type":"string"}},{"name":"redListStatusId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of red list status. Use Metadata-API to find
        identifiers. Will return entries of taxa that are marked with the red list
        status. Multiple values are seperated by '',''. When multiple values are given,
        this is an OR search. API resource: /metadata/ranges/MX.iucnStatuses","schema":{"type":"string"}},{"name":"taxonAdminFiltersOperator","in":"query","required":false,"description":"This
        parameter controls if search between administrativeStatusId and redListStatusId
        is an AND (default) or OR search.","schema":{"type":"string","enum":["AND","OR"]}},{"name":"typeOfOccurrenceId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of type of occurrence in Finland. Use Metadata-API
        to find identifiers. Will return entries of taxa that are marked with one
        or more of the specified statuses. Multiple values are seperated by '',''.
        When multiple values are given, this is an OR search. API resource: /metadata/ranges/MX.typeOfOccurrenceEnum","schema":{"type":"string"}},{"name":"typeOfOccurrenceIdNot","in":"query","required":false,"description":"Exclude
        based on URI or Qname identifier of type of occurrence in Finland. Use Metadata-API
        to find identifiers. Will return entries of taxa that are not marked with
        any of the specified statuses. Multiple values are seperated by '',''. When
        multiple values are given, this is an OR search. API resource: /metadata/ranges/MX.typeOfOccurrenceEnum","schema":{"type":"string"}},{"name":"primaryHabitat","in":"query","required":false,"description":"Filter
        based on primary habitat of taxa. Will return entries of taxa that have one
        of the specified habitats or a subhabitat of the given habitats. Syntax: MKV.habitatMk[MKV.habitatSpecificTypeJ,MKV.habitatSpecificTypePAK]
        Multiple values are seperated by '';''. When multiple values are given, this
        is an OR search.","schema":{"type":"string"}},{"name":"anyHabitat","in":"query","required":false,"description":"Filter
        based on habitat of taxa (primary or secondary). Will return entries of taxa
        that have one of the specified habitats or a subhabitat of the given habitats.
        Syntax: MKV.habitatMk[MKV.habitatSpecificTypeJ,MKV.habitatSpecificTypePAK]
        Multiple values are seperated by '';''. When multiple values are given, this
        is an OR search.","schema":{"type":"string"}},{"name":"occurrenceCountMax","in":"query","required":false,"description":"Filter
        based on occurrence count of taxa. Will return entries of taxa that have less
        occurrences than the given parameter.","schema":{"type":"integer"}},{"name":"occurrenceCountFinlandMax","in":"query","required":false,"description":"Filter
        based on occurrence count in Finland of taxa. Will return entries of taxa
        that have less occurrences in Finland than the given parameter.","schema":{"type":"integer"}},{"name":"finnish","in":"query","required":false,"description":"Filter
        only those taxa that are finnish or are not finnish.","schema":{"type":"boolean"}},{"name":"invasive","in":"query","required":false,"description":"Filter
        only those taxa that are invasive or are not invasive.","schema":{"type":"boolean"}},{"name":"sensitive","in":"query","required":false,"description":"Include
        only those occurrences that are of sensitive species or those that are of
        non-sensitive species","schema":{"type":"boolean"}},{"name":"higherTaxon","in":"query","required":false,"description":"True:
        Filter those occurrence that are linked to a higher taxon (like genus, family).
        False: linked to taxon that is species, subspecies, aggregate or other lower
        rank.","schema":{"type":"boolean"}},{"name":"taxonRankId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of taxon rank. Use Metadata-API to find identifiers.
        Will return entries of taxa that are of the specified ranks. Multiple values
        are seperated by '',''. When multiple values are given, this is an OR search.
        API resource: /metadata/ranges/MX.taxonRankEnum","schema":{"type":"string"}},{"name":"countryId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of a country. Use Area-API to find identifiers.
        Will return entries where we have been able to interpret the country from
        coordinates or from reported area name. Multiple values are seperated by '',''.
        When multiple values are given, this is an OR search. API resource: /areas","schema":{"type":"string"}},{"name":"finnishMunicipalityId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of a finnish municipality. Use Area-API to
        find identifiers. Will return entries where we have been able to interpret
        the municipality from coordinates or from reported area name. Multiple values
        are seperated by '',''. When multiple values are given, this is an OR search.
        API resource: /areas","schema":{"type":"string"}},{"name":"biogeographicalProvinceId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of a biogeographical province. Use Area-API
        to find identifiers. Will return entries where we have been able to interpret
        the province from coordinates or from reported area name. Multiple values
        are seperated by '',''. When multiple values are given, this is an OR search.
        API resource: /areas","schema":{"type":"string"}},{"name":"elyCentreId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of a ELY centre. Use Area-API to find identifiers.
        Implementation is based on municipality interpretations. Multiple values are
        seperated by '',''. When multiple values are given, this is an OR search.
        API resource: /areas","schema":{"type":"string"}},{"name":"provinceId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of a Finnish province. Use Area-API to find
        identifiers. Implementation is based on municipality interpretations. Multiple
        values are seperated by '',''. When multiple values are given, this is an
        OR search. API resource: /areas","schema":{"type":"string"}},{"name":"area","in":"query","required":false,"description":"Filter
        using name of country, municipality, province or locality. If the given name
        matches exactly one known area, the search will perform an identifier search.
        Otherwise the search looks from country verbatim, municipality verbatim, province
        verbatim and locality using exact match case insensitive search. Multiple
        values are seperated by '',''. When multiple values are given, this is an
        OR search.","schema":{"type":"string"}},{"name":"namedPlaceId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of a NamedPlace. Use NamedPlace-API to find
        identifiers. Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search. API resource: /named-places","schema":{"type":"string"}},{"name":"namedPlaceTag","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of MNP.tagEnum (use metadata-api to resolve
        identifiers) Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search. API resource: /metadata/ranges/MNP.tagEnum","schema":{"type":"string"}},{"name":"birdAssociationAreaId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of a BirdAssociationArea. Use Area-API to
        find identifiers. Bird association area is interpreted based on YKJ 10KM grids
        (the grid the occurrence centerpoint is in). Multiple values are seperated
        by '',''. When multiple values are given, this is an OR search. API resource:
        /areas","schema":{"type":"string"}},{"name":"formId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of a Vihko Notebook form that was used to
        report the entry. Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search. API resource: /forms","schema":{"type":"string"}},{"name":"time","in":"query","required":false,"description":"Filter
        using event date. Date can be a full date or part of a date, for example 2000,
        2000-06 or 2000-06-25. Time can be a range, for example 2000/2005 or 2000-01-01/2005-12-31.
        Relative days \"last N days\" can be used: 0 is today, -1 is yesterday and
        so on; for example -7/0 is a range between 7 days ago and today. Multiple
        values are seperated by '',''. When multiple values are given, this is an
        OR search.","schema":{"type":"string"}},{"name":"timeAccuracy","in":"query","required":false,"description":"Filter
        using event date accuracy range in days. Will include entries where time span
        in days is less or equal to the given value.","schema":{"type":"integer"}},{"name":"yearMonth","in":"query","required":false,"description":"Filter
        using event date. Value can be a year (2000), year range (2000/2001), year-month
        (2000-06) or a year-month range (2000-06/2000-08). (Note: this filter is mostly
        aimed to be used in /statistics queries because ''time'' filter is not available
        for /statistics queries.) Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search.","schema":{"type":"string"}},{"name":"dayOfYear","in":"query","required":false,"description":"Filter
        using day of year. For example \"100/160\" gives all records during spring
        and \"330/30\" during mid winter. If begin is ommited will use day 1 and if
        end is ommited will use day 366. Multiple ranges can be given by providing
        the parameter more times. Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search.","schema":{"type":"string"}},{"name":"season","in":"query","required":false,"description":"Filter
        using season. For example \"501/630\" gives all records for May and July and
        \"1220/0220\" between 20.12. - 20.2. If begin is ommited will use 1.1. and
        if end is ommited will use 31.12. Multiple ranges can be given by providing
        the parameter more times. Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search.","schema":{"type":"string"}},{"name":"keyword","in":"query","required":false,"description":"Filter
        using keywords that have been tagged to entries. There are many types of keywods
        varying from legacy identifiers, project names and IDs, dataset ids, etc.  Will
        include records with quality issues (normally exluded by default). Multiple
        values are seperated by '',''. When multiple values are given, this is an
        OR search.","schema":{"type":"string"}},{"name":"collectionId","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of collections. Use Collections-API to resolve
        identifiers. Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search. API resource: /collections","schema":{"type":"string"}},{"name":"collectionIdExplicit","in":"query","required":false,"description":"Filter
        based on URI or Qname identifier of collections. Use Collections-API to resolve
        identifiers. Will not include child collections Multiple values are seperated
        by '',''. When multiple values are given, this is an OR search. API resource:
        /collections","schema":{"type":"string"}},{"name":"collectionIdNot","in":"query","required":false,"description":"Exclude
        certain collections. Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search. API resource: /collections","schema":{"type":"string"}},{"name":"collectionIdExplicitNot","in":"query","required":false,"description":"Exclude
        certain collection (only the specified collection, not child collections)
        Multiple values are seperated by '',''. When multiple values are given, this
        is an OR search. API resource: /collections","schema":{"type":"string"}},{"name":"includeSubCollections","in":"query","required":false,"description":"Defines
        if collectionId filter should include sub collections of the given collection
        ids. By default sub collections are included.","schema":{"type":"boolean"}},{"name":"sourceId","in":"query","required":false,"description":"Filter
        using identifiers of data sources (information systems). Use InformationSystem-API
        to resolve identifiers. Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search. API resource: /sources","schema":{"type":"string"}},{"name":"recordBasis","in":"query","required":false,"description":"Filter
        using record basis. This can be used for example to get only preserved specimens.
        Multiple values are seperated by '',''. When multiple values are given, this
        is an OR search.","schema":{"type":"string","enum":["PRESERVED_SPECIMEN","LIVING_SPECIMEN","FOSSIL_SPECIMEN","SUBFOSSIL_SPECIMEN","SUBFOSSIL_AMBER_INCLUSION_SPECIMEN","MICROBIAL_SPECIMEN","HUMAN_OBSERVATION_UNSPECIFIED","HUMAN_OBSERVATION_SEEN","HUMAN_OBSERVATION_HEARD","HUMAN_OBSERVATION_PHOTO","HUMAN_OBSERVATION_INDIRECT","HUMAN_OBSERVATION_HANDLED","HUMAN_OBSERVATION_VIDEO","HUMAN_OBSERVATION_RECORDED_AUDIO","MACHINE_OBSERVATION_UNSPECIFIED","MACHINE_OBSERVATION_PHOTO","MACHINE_OBSERVATION_VIDEO","MACHINE_OBSERVATION_AUDIO","MACHINE_OBSERVATION_GEOLOGGER","MACHINE_OBSERVATION_SATELLITE_TRANSMITTER","LITERATURE","MATERIAL_SAMPLE","MATERIAL_SAMPLE_AIR","MATERIAL_SAMPLE_SOIL","MATERIAL_SAMPLE_WATER"]}},{"name":"superRecordBasis","in":"query","required":false,"description":"Filter
        using super record basis. (Note: Even though the enumeration lists all record
        basis values, only few of those are super record basis: PRESERVED_SPECIMEN,
        HUMAN_OBSERVATION_UNSPECIFIED, ..; use aggregate by superRecordBasis to find
        used values. Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search.","schema":{"type":"string","enum":["PRESERVED_SPECIMEN","LIVING_SPECIMEN","FOSSIL_SPECIMEN","SUBFOSSIL_SPECIMEN","SUBFOSSIL_AMBER_INCLUSION_SPECIMEN","MICROBIAL_SPECIMEN","HUMAN_OBSERVATION_UNSPECIFIED","HUMAN_OBSERVATION_SEEN","HUMAN_OBSERVATION_HEARD","HUMAN_OBSERVATION_PHOTO","HUMAN_OBSERVATION_INDIRECT","HUMAN_OBSERVATION_HANDLED","HUMAN_OBSERVATION_VIDEO","HUMAN_OBSERVATION_RECORDED_AUDIO","MACHINE_OBSERVATION_UNSPECIFIED","MACHINE_OBSERVATION_PHOTO","MACHINE_OBSERVATION_VIDEO","MACHINE_OBSERVATION_AUDIO","MACHINE_OBSERVATION_GEOLOGGER","MACHINE_OBSERVATION_SATELLITE_TRANSMITTER","LITERATURE","MATERIAL_SAMPLE","MATERIAL_SAMPLE_AIR","MATERIAL_SAMPLE_SOIL","MATERIAL_SAMPLE_WATER"]}},{"name":"lifeStage","in":"query","required":false,"description":"Filter
        using life stage of an unit. Multiple values are seperated by '',''. When
        multiple values are given, this is an OR search.","schema":{"type":"string","enum":["ADULT","JUVENILE","IMMATURE","EGG","TADPOLE","PUPA","NYMPH","SUBIMAGO","LARVA","SNAG","EMBRYO","SUBADULT","MATURE","STERILE","FERTILE","SPROUT","DEAD_SPROUT","BUD","FLOWER","WITHERED_FLOWER","SEED","RIPENING_FRUIT","RIPE_FRUIT","SUBTERRANEAN","GALL","MARKS","TRIUNGULIN"]}},{"name":"sex","in":"query","required":false,"description":"Filter
        using sex of an unit. When filtering MALE or FEMALE, will include those where
        individualCountMale/Female is >= 1 Multiple values are seperated by '',''.
        When multiple values are given, this is an OR search.","schema":{"type":"string","enum":["MALE","FEMALE","WORKER","UNKNOWN","NOT_APPLICABLE","GYNANDROMORPH","MULTIPLE","CONFLICTING"]}},{"name":"invasiveControl","in":"query","required":false,"description":"Filter
        using effectiveness of invasive control measures Multiple values are seperated
        by '',''. When multiple values are given, this is an OR search.","schema":{"type":"string","enum":["FULL","PARTIAL","NO_EFFECT","NOT_FOUND"]}},{"name":"invasiveControlled","in":"query","required":false,"description":"Filter
        only invasives that are reported to have been controlled successfully or not
        reported to have been controlled succesfully.","schema":{"type":"boolean"}},{"name":"documentId","in":"query","required":false,"description":"Filter
        using document URIs. Will include records with quality issues (normally exluded
        by default). Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search.","schema":{"type":"string"}},{"name":"documentIdPrefix","in":"query","required":false,"description":"Filter
        using document URI prefix. For example prefix of http://id.luomus.fi/JA.1
        is luomus:JA.  Will include records with quality issues (normally exluded
        by default). Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search.","schema":{"type":"string"}},{"name":"gatheringId","in":"query","required":false,"description":"Filter
        using gathering URIs. Will include records with quality issues (normally exluded
        by default). Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search.","schema":{"type":"string"}},{"name":"unitId","in":"query","required":false,"description":"Filter
        using unit ids.  Will include records with quality issues (normally exluded
        by default). Multiple values are seperated by '',''. When multiple values
        are given, this is an OR search.","schema":{"type":"string"}},{"name":"sampleId","in":"query","required":false,"description":"Filter
        using preparation/sample ids.  Will include records with quality issues (normally
        exluded by default). Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search.","schema":{"type":"string"}},{"name":"individualId","in":"query","required":false,"description":"Filter
        using identifier of an individual, for example bird ring. Multiple values
        are seperated by '',''. When multiple values are given, this is an OR search.","schema":{"type":"string"}},{"name":"individualCountMin","in":"query","required":false,"description":"Filter
        using idividual count. Unreported individual count is assumed to mean \"1+\",
        so searching min=1 returns where count > 0 or count is not given. To search
        for \"zero observations\" use max=0. Defaults to 1 but when using annotation
        endpoint defaults to null.","schema":{"type":"integer","default":1}},{"name":"individualCountMax","in":"query","required":false,"description":"Filter
        using idividual count. Unreported individual count is assumed to mean \"1+\",
        so searching min=1 returns where count > 0 or count is not given. To search
        for \"null observations\" use max=0.","schema":{"type":"integer"}},{"name":"loadedSameOrAfter","in":"query","required":false,"description":"Filter
        using the date data was loaded to Data Warehouse. Format is yyyy-MM-dd or
        UNIX EPOCH timestamp in seconds. Returns entries loaded later or on the same
        date/timestamp.","schema":{"type":"string","format":"yyyy-MM-dd"}},{"name":"loadedSameOrBefore","in":"query","required":false,"description":"Filter
        using the date data was loaded to Data Warehouse. Format is yyyy-MM-dd or
        UNIX EPOCH timestamp in seconds. Returns entries loaded before or on the same
        date/timestamp.","schema":{"type":"string","format":"yyyy-MM-dd"}},{"name":"firstLoadedSameOrAfter","in":"query","required":false,"description":"Filter
        using the date data was loaded to Data Warehouse (first load of document).
        Format is yyyy-MM-dd or UNIX EPOCH timestamp in seconds. Returns entries loaded
        later or on the same date/timestamp.","schema":{"type":"string","format":"yyyy-MM-dd"}},{"name":"firstLoadedSameOrBefore","in":"query","required":false,"description":"Filter
        using the date data was loaded to Data Warehouse (first load of document).
        Format is yyyy-MM-dd or UNIX EPOCH timestamp in seconds. Returns entries loaded
        before or on the same date/timestamp.","schema":{"type":"string","format":"yyyy-MM-dd"}},{"name":"includeNullLoadDates","in":"query","required":false,"description":"Used
        with filters loadedSameOrAfter, loadedSameOrBefore, firstLoadedSameOrAfter,
        firstLoadedSameOrBefore: If set to true will include matches even if the date
        is not present. Default is false.","schema":{"type":"boolean","default":false}},{"name":"createdDateYear","in":"query","required":false,"description":"Filter
        using the year the record was created","schema":{"type":"integer"}},{"name":"coordinates","in":"query","required":false,"description":"Filter
        using coordinates. Valid formats are latMin:latMax:lonMin:lonMax:CRS:ratio
        and lat:lon:CRS:ratio. The last parameter (ratio) is not required. Valid CRSs
        are WGS84, YKJ and EUREF (WGS84 = EPSG:4326; EUREF = ETRS-TM35FIN EPSG:3067;
        YKJ = EPSG:2393). For metric coordinates (ykj, euref): the search 666:333:YKJ
        means lat between 6660000-6670000 and lon between 3330000-3340000. Ratio is
        a number between 0.0-1.0. Default ratio is 1.0 (observation area must be entirely
        inside the search area). Ratio 0.0: the search area must intersect with the
        observation area. For WGS84 the ratio is not calculated in meters but in degrees
        so it an approximation. Multiple values are seperated by '',''. When multiple
        values are given, this is an OR search.","schema":{"type":"string"}},{"name":"polygon","in":"query","required":false,"description":"Filter
        centerpoint of occurrences by polygon. Valid formats are WKT and WKT:CRS.
        Valid CRSs are WGS84, YKJ and EUREF (default) (WGS84 = EPSG:4326; EUREF =
        ETRS-TM35FIN EPSG:3067; YKJ = EPSG:2393).  Polygon search is implemented only
        for Finland (based on ETRS-TM35FIN coordinate system). WKT must be somewhat
        shorter than 4000 chars. To overcome this limitation use polygonId filter
        and /polygon/ endpoint to get the polygonIds.","schema":{"type":"string"}},{"name":"polygonId","in":"query","required":false,"description":"Filter
        centerpoint occurrences using ID of a search polygon. Use /polygon/ endpoint
        to get id if the polygon.","schema":{"type":"string"}},{"name":"coordinateAccuracyMax","in":"query","required":false,"description":"Exclude
        coordinates that are less accurate or equal than the provided value (inclusive).
        Value is meters. Accuracy is a guiding logaritmic figure, for example 1m,
        10m, 100m or 100km. (More specifically the longest length of the area bouding
        box rounded up on the logarithmic scale.)","schema":{"type":"integer"}},{"name":"wgs84CenterPoint","in":"query","required":false,"description":"Filter
        using WGS84 (EPSG:4326) centerpoint. Valid formats are lat:lon:WGS84 and latMin:latMax:lonMin:lonMax:WGS84.
        (You must include the crs WGS84 even though it is the only supported type.)
        Multiple values are seperated by '',''. When multiple values are given, this
        is an OR search.","schema":{"type":"string"}},{"name":"ykj1km","in":"query","required":false,"description":"Filter
        using uniform (YKJ, EPSG:2393) 1km grid square(s). Valid format is lat:lon.
        Multiple values are seperated by '',''. When multiple values are given, this
        is an OR search.","schema":{"type":"string"}},{"name":"ykj10km","in":"query","required":false,"description":"Filter
        using uniform (YKJ, EPSG:2393) 10km grid square(s). Valid format is lat:lon.
        Multiple values are seperated by '',''. When multiple values are given, this
        is an OR search.","schema":{"type":"string"}},{"name":"ykj50km","in":"query","required":false,"description":"Filter
        using uniform (YKJ, EPSG:2393) 50km grid square(s). Valid format is lat:lon.
        Multiple values are seperated by '',''. When multiple values are given, this
        is an OR search.","schema":{"type":"string"}},{"name":"ykj100km","in":"query","required":false,"description":"Filter
        using uniform (YKJ, EPSG:2393) 100km grid square(s). Valid format is lat:lon.
        Multiple values are seperated by '',''. When multiple values are given, this
        is an OR search.","schema":{"type":"string"}},{"name":"ykj1kmCenter","in":"query","required":false,"description":"Filter
        using uniform (YKJ, EPSG:2393) 1km grid square(s) that are resolved using
        center point of the area. Valid format is lat:lon. Multiple values are seperated
        by '',''. When multiple values are given, this is an OR search.","schema":{"type":"string"}},{"name":"ykj10kmCenter","in":"query","required":false,"description":"Filter
        using uniform (YKJ, EPSG:2393) 10km grid square(s) that are resolved using
        center point of the area. Valid format is lat:lon. Multiple values are seperated
        by '',''. When multiple values are given, this is an OR search.","schema":{"type":"string"}},{"name":"ykj50kmCenter","in":"query","required":false,"description":"Filter
        using uniform (YKJ, EPSG:2393) 50km grid square(s) that are resolved using
        center point of the area. Valid format is lat:lon. Multiple values are seperated
        by '',''. When multiple values are given, this is an OR search.","schema":{"type":"string"}},{"name":"ykj100kmCenter","in":"query","required":false,"description":"Filter
        using uniform (YKJ, EPSG:2393) 100km grid square(s) that are resolved using
        center point of the area. Valid format is lat:lon. Multiple values are seperated
        by '',''. When multiple values are given, this is an OR search.","schema":{"type":"string"}},{"name":"sourceOfCoordinates","in":"query","required":false,"description":"Filter
        based on source of coordinates. Possible values are REPORTED_VALUE = the reported
        coordinates or FINNISH_MUNICIPALITY = the coordinates are the bounding box
        of the reported Finnish municipality (no coordinates were reported). Multiple
        values are seperated by '',''. When multiple values are given, this is an
